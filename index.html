<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="js/main.js"></script>
</head>
<body>
  <div class="calc">
    <input type="text" class="display" name="display" autocomplete="off" autofocus>
    <div class="calc-row">
      <button class="calc-op" id="all-clear">AC</button>
      <button class="calc-op" id="clear-entry">CE</button>
      <button class="calc-op" id="back">⌫</button>
      <button class="op" id="div">÷</button>
    </div>
    <div class="calc-row">
      <button class="num" id="num-1">1</button>
      <button class="num" id="num-2">2</button>
      <button class="num" id="num-3">3</button>
      <button class="op" id="mul">×</button>
    </div>
    <div class="calc-row">
      <button class="num" id="num-4">4</button>
      <button class="num" id="num-5">5</button>
      <button class="num" id="num-6">6</button>
      <button class="op" id="add">+</button>
    </div>
    <div class="calc-row">
      <button class="num" id="num-7">7</button>
      <button class="num" id="num-8">8</button>
      <button class="num" id="num-9">9</button>
      <button class="op" id="sub">-</button>
    </div>
    <div class="calc-row">
      <button class="num" id="num-0">0</button>
      <button class="num" id="num-decimal">.</button>
      <button class="num" id="sign-change">+/-</button>
      <button class="op" id="equal">=</button>
    </div>
  </div>
</body>
</html>
